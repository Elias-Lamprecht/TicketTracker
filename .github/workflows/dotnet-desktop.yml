name: Build & Test Github Action

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # --- JOB 1: BUILD ---
  build:
    name: "Build Project"
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create Constants file
      shell: pwsh
      run: |
        # Fix: Ensure the directory exists before writing the file
        $root = "${{ github.workspace }}"
        $targetDir = Join-Path $root "TicketTracker.CoreLibrary"
        
        if (!(Test-Path $targetDir)) { 
            Write-Host "Directory $targetDir not found. Creating it..."
            New-Item -ItemType Directory -Path $targetDir -Force 
        }

        $content = @"
        namespace TicketTracker;
        public static class Constants
        {
            public const string ConnectionString = "${{ secrets.DB_CONNECTION_STRING }}";
        }
        "@
        
        $targetFile = Join-Path $targetDir "Constants.cs"
        Set-Content -Path $targetFile -Value $content

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Add SqlClient
      working-directory: ./TicketTracker.CoreLibrary
      run: dotnet add package Microsoft.Data.SqlClient

    - name: Restore dependencies
      working-directory: ./TicketTracker.CoreLibrary
      run: dotnet restore

    - name: Build
      working-directory: ./TicketTracker.CoreLibrary
      run: dotnet build --no-restore --configuration Release

  # --- JOB 2: TEST ---
  test:
    name: "Run Unit Tests"
    needs: build
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Create Constants file (for Tests)
      shell: pwsh
      run: |
        $root = "${{ github.workspace }}"
        $targetDir = Join-Path $root "TicketTracker.CoreLibrary"
        if (!(Test-Path $targetDir)) { New-Item -ItemType Directory -Path $targetDir -Force }

        $content = @"
        namespace TicketTracker;
        public static class Constants { public const string ConnectionString = "${{ secrets.DB_CONNECTION_STRING }}"; }
        "@
        Set-Content -Path (Join-Path $targetDir "Constants.cs") -Value $content

    - name: Add SqlClient
      working-directory: ./TicketTracker.CoreLibrary
      run: dotnet add package Microsoft.Data.SqlClient

    - name: Test
      working-directory: ./TicketTracker.Tests
      run: dotnet test --configuration Release --verbosity normal
