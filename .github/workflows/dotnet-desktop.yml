name: Build & Test Github Action

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create Constants file
      shell: pwsh
      run: |
        $content = @"
        namespace TicketTracker;

        public static class Constants
        {
            public const string ConnectionString = "${{ secrets.DB_CONNECTION_STRING }}";
        }
        "@
        Set-Content -Path "Constants.cs" -Value $content

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Add SqlClient
      run: dotnet add package Microsoft.Data.SqlClient

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
